<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavié Smartphones — Módulos Samsung J</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f13; color: #f0f0f0; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: #cc2255; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; }
  .logo-text { font-size: 20px; font-weight: 600; color: #fff; }
  .logo-sub { font-size: 12px; color: #888; margin-top: 1px; }

  .stats { display: flex; gap: 20px; }
  .stat-card { background: #1a1a20; padding: 12px 20px; border-radius: 12px; border: 1px solid #2a2a35; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; color: #4ade80; }

  .toolbar { background: #1a1a20; padding: 16px; border-radius: 12px; border: 1px solid #2a2a35; margin-bottom: 1.5rem; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  input, select, button { background: #0f0f13; border: 1px solid #3a3a45; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
  input:focus, select:focus { border-color: #cc2255; }
  input#buscar { flex-grow: 1; min-width: 200px; }
  
  button { cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  button:hover { background: #22222a; border-color: #888; }
  .btn-upload { background: #1a2a1a; border-color: #2a4a2a; color: #4ade80; }
  .btn-upload:hover { background: #223a22; }
  .btn-export { background: #22222a; color: #aaa; }

  table { width: 100%; border-collapse: collapse; background: #1a1a20; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a35; }
  th { background: #252530; text-align: left; padding: 14px; font-size: 12px; text-transform: uppercase; color: #888; font-weight: 600; border-bottom: 1px solid #2a2a35; }
  td { padding: 14px; border-bottom: 1px solid #22222a; font-size: 15px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #21212a; }

  .r { font-weight: 700; color: #fff; }
  .ars-desc { color: #4ade80; font-weight: 600; }
  .usd { color: #60a5fa; font-size: 14px; }
  
  .badge-nueva { background: #4ade8022; color: #4ade80; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; text-transform: uppercase; font-weight: 800; }
  .nueva { animation: pulse-green 2s infinite; }
  @keyframes pulse-green { 0% { background: #0000; } 50% { background: #4ade8011; } 100% { background: #0000; } }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; }
    .toolbar { flex-direction: column; align-items: stretch; }
    td, th { padding: 10px; font-size: 13px; }
    .usd { display: block; margin-top: 4px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">L</div>
      <div>
        <div class="logo-text">Lavié <span style="color:#cc2255">Smartphones</span></div>
        <div class="logo-sub">Gestión de Stock — Serie J</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Modelos</div>
        <div class="stat-value" id="total-modelos">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dólar Blue</div>
        <div class="stat-value" id="val-dolar">Cargando...</div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="buscar" placeholder="🔍 Buscar modelo..." oninput="renderTabla()" />
    <select id="filtro-tipo" onchange="renderTabla()">
      <option value="">Todos los tipos</option>
      <option value="Prime">Prime</option>
      <option value="Core">Core</option>
      <option value="Neo">Neo</option>
      <option value="Pro">Pro</option>
      <option value="Plus">Plus</option>
    </select>
    
    <button class="btn-upload" onclick="document.getElementById('upload-stock').click()">
      📁 Cargar Excel/CSV
    </button>
    <input type="file" id="upload-stock" accept=".csv, .xlsx, .xls" style="display:none" onchange="importarArchivo(event)" />
    
    <button class="btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
  </div>

  <table id="tabla-precios">
    <thead>
      <tr>
        <th>Modelo</th>
        <th>Precio Lista</th>
        <th>Contado (-5%)</th>
        <th>Dólar</th>
      </tr>
    </thead>
    <tbody id="lista-productos">
      </tbody>
  </table>
</div>

<script>
let productos = [
  { modelo: "Samsung J2 Prime", precio: 12500 },
  { modelo: "Samsung J2 Core", precio: 11800 },
  { modelo: "Samsung J4 (2018)", precio: 14200 },
  { modelo: "Samsung J4 Core", precio: 13500 },
  { modelo: "Samsung J4 Plus", precio: 15100 },
  { modelo: "Samsung J5 (2016)", precio: 13900 },
  { modelo: "Samsung J5 Prime", precio: 14500 },
  { modelo: "Samsung J5 Pro", precio: 16800 },
  { modelo: "Samsung J6 (2018)", precio: 17500 },
  { modelo: "Samsung J6 Plus", precio: 18900 },
  { modelo: "Samsung J7 (2016)", precio: 16200 },
  { modelo: "Samsung J7 Prime", precio: 17800 },
  { modelo: "Samsung J7 Pro", precio: 19500 },
  { modelo: "Samsung J7 Neo", precio: 15800 },
  { modelo: "Samsung J8 (2018)", precio: 21000 }
];

let dolarBlue = 0;

async function obtenerDolar() {
  try {
    const res = await fetch('https://dolarapi.com/v1/dolares/blue');
    const data = await res.json();
    dolarBlue = data.compra;
    document.getElementById('val-dolar').textContent = `$${dolarBlue}`;
    renderTabla();
  } catch (e) {
    document.getElementById('val-dolar').textContent = 'Error';
  }
}

function renderTabla() {
  const listaBody = document.getElementById('lista-productos');
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const tipo = document.getElementById('filtro-tipo').value;

  const filtrados = productos.filter(p => 
    p.modelo.toLowerCase().includes(buscar) && (tipo === '' || p.modelo.includes(tipo))
  );

  document.getElementById('total-modelos').textContent = filtrados.length;

  listaBody.innerHTML = filtrados.map(p => {
    const desc = Math.round(p.precio * 0.95);
    const usd = dolarBlue ? (p.precio / dolarBlue).toFixed(2) : '—';
    const n = p.nueva ? ' nueva' : '';
    const badge = p.nueva ? '<span class="badge-nueva">✨ nuevo</span>' : '';
    return `<tr>
      <td class="${n}">${p.modelo}${badge}</td>
      <td class="r${n}">$${p.precio.toLocaleString('es-AR')}</td>
      <td class="ars-desc${n}">$${desc.toLocaleString('es-AR')}</td>
      <td class="usd${n}">${usd !== '—' ? 'U$D ' + usd : '—'}</td>
    </tr>`;
  }).join('');
}

function importarArchivo(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    const data = event.target.result;
    let listaImportada = [];

    try {
      if (file.name.endsWith('.csv')) {
        const content = event.target.result;
        const filas = content.split('\n').slice(1);
        listaImportada = filas.map(f => {
          const columnas = f.split(',');
          return { modelo: columnas[0]?.replace(/"/g, '').trim(), precio: parseInt(columnas[1]) };
        }).filter(p => p.modelo && !isNaN(p.precio));
      } else {
        const workbook = XLSX.read(data, { type: 'binary' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        listaImportada = json.map(row => ({
          modelo: row.Modelo || row.modelo || Object.values(row)[0],
          precio: parseInt(row.Precio || row.precio || Object.values(row)[1])
        })).filter(p => p.modelo && !isNaN(p.precio));
      }

      if (listaImportada.length > 0) {
        listaImportada.forEach(nuevo => {
          const idx = productos.findIndex(p => p.modelo.toLowerCase() === nuevo.modelo.toLowerCase());
          if (idx !== -1) {
            productos[idx].precio = nuevo.precio;
            productos[idx].nueva = true;
          } else {
            productos.push({ ...nuevo, nueva: true });
          }
        });
        renderTabla();
        alert(`Se cargaron/actualizaron ${listaImportada.length} productos.`);
        setTimeout(() => { productos.forEach(p => p.nueva = false); renderTabla(); }, 4000);
      }
    } catch (err) {
      alert("Error al procesar el archivo. Asegurate de que tenga columnas 'Modelo' y 'Precio'.");
    }
    e.target.value = '';
  };

  if (file.name.endsWith('.csv')) reader.readAsText(file);
  else reader.readAsBinaryString(file);
}

function exportarCSV() {
  let csv = 'Modelo,Precio\\n';
  productos.forEach(p => csv += `"${p.modelo}",${p.precio}\\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stock_lavie.csv';
  a.click();
}

obtenerDolar();
</script>

</body>
</html>
